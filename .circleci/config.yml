version: 2.1

orbs:
  coveralls: coveralls/coveralls@2.2.5

jobs:
  build_and_test:
    docker:
      - image: cimg/go:1.25.0
        environment:
          DB_NAME: notification_manager_test_db
          DB_USER: root
          DB_PASSWORD: root_password
          DB_HOST: 127.0.0.1
          DB_PORT: 3307
      - image: mysql:8.0
        environment:
          MYSQL_DATABASE: notification_manager_test_db
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_TCP_PORT: 3307
    steps:
      - checkout
      - run:
          name: Build Application
          command: |
            go build -v ./...
      - run:
          name: Setup Database
          command: |
            until nc -z 127.0.0.1 3307; do echo "Waiting for MySQL..."; sleep 2; done
            go run cmd/db/main.go -all
      - run:
          name: Run tests
          environment:
            COVERALLS_REPO_TOKEN: ${COVERALLS_REPO_TOKEN}
          command: gotestsum --junitfile junit.xml
          pre:
            - go install github.com/mattn/goveralls@latest
          override:
            - go test -v -cover -race -coverprofile=/coverage.out
          post:
            - /.go_workspace/bin/goveralls -coverprofile=/coverage.out -service=circle-ci -repotoken=$COVERALLS_TOKEN
      - store_test_results:
          path: junit.xml

workflows:
  main:
    jobs:
      - build_and_test