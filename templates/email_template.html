<!DOCTYPE html>
<html lang="en">
<body style="margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #333; background-color: #ffffff;">

<div style="max-width: 500px; margin: auto;">
    <p style="font-size: 12px; line-height: 1; color: #555;">
        Notification Management System - THC
    </p>
</div>

<div style="max-width: 500px; margin: 0 auto; border-top: 4px solid #000; padding-top: 20px;">

    <h2 style="font-size: 18px; color: #000; margin-bottom: 10px;">
        {{.Title}}
    </h2>

    <p style="font-size: 16px; line-height: 1.5; color: #555;">
        {{.Content}}
    </p>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <p style="font-size: 12px; color: #999; font-style: italic;">
        Notification was sent by: <strong>{{.Sender}}</strong>
    </p>

</div>
</body>
</html>
